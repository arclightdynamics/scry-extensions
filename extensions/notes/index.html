<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Notes</title>
<style>
  :root {
    --bg: #05090c; --bg1: #0a1217; --line: rgba(255,255,255,.08);
    --line2: rgba(255,255,255,.15); --fg: #eef4f5; --fg2: #aab8bd; --fg3: #71828a;
    --cyan: #5ee0d7; --violet: #8b7dff; --mono: ui-monospace,"JetBrains Mono",Consolas,monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--fg); font-family: system-ui,-apple-system,sans-serif;
    display: grid; grid-template-columns: 188px 1fr; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* sidebar */
  .side { border-right: 1px solid var(--line); background: rgba(0,0,0,.22); display: flex; flex-direction: column; min-height: 0; }
  .side-h { display: flex; align-items: center; gap: 8px; padding: 12px 12px 10px; border-bottom: 1px solid var(--line); }
  .side-h .t { font-size: 11px; letter-spacing: .18em; color: var(--cyan); flex: 1; }
  .side-h button { background: rgba(94,224,215,.12); color: var(--cyan); border: 1px solid rgba(94,224,215,.3);
    width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 15px; line-height: 1; }
  .side-h button:hover { background: rgba(94,224,215,.22); }
  .list { flex: 1; overflow-y: auto; padding: 6px; }
  .note { padding: 8px 9px; border-radius: 7px; cursor: pointer; border: 1px solid transparent; margin-bottom: 3px; }
  .note:hover { background: rgba(255,255,255,.04); }
  .note.on { background: rgba(94,224,215,.1); border-color: rgba(94,224,215,.28); }
  .note .nt { font-size: 12.5px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note .nd { font-family: var(--mono); font-size: 9.5px; color: var(--fg3); margin-top: 2px; }
  .note .del { float: right; color: var(--fg3); opacity: 0; }
  .note:hover .del { opacity: 1; }
  .note .del:hover { color: #ff6b6b; }

  /* editor */
  .main { display: grid; grid-template-rows: auto 1fr; min-height: 0; min-width: 0; }
  .bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--line); }
  .bar input { flex: 1; background: transparent; border: none; outline: none; color: var(--fg); font-size: 15px; font-weight: 600; }
  .bar .seg { display: flex; gap: 2px; background: rgba(0,0,0,.3); border: 1px solid var(--line); border-radius: 7px; padding: 2px; }
  .bar .seg button { background: none; border: none; color: var(--fg3); font-family: var(--mono); font-size: 10px;
    padding: 4px 9px; border-radius: 5px; cursor: pointer; letter-spacing: .04em; }
  .bar .seg button.on { background: rgba(94,224,215,.14); color: var(--cyan); }
  .panes { display: grid; min-height: 0; }
  textarea { width: 100%; height: 100%; resize: none; background: var(--bg); color: var(--fg2); border: none; outline: none;
    padding: 16px 18px; font-family: var(--mono); font-size: 13px; line-height: 1.7; }
  .preview { overflow-y: auto; padding: 16px 20px; line-height: 1.65; font-size: 14px; }
  .preview h1,.preview h2,.preview h3 { color: var(--fg); margin: .8em 0 .4em; line-height: 1.25; }
  .preview h1 { font-size: 1.5em; } .preview h2 { font-size: 1.25em; } .preview h3 { font-size: 1.08em; }
  .preview p { margin: .5em 0; color: var(--fg2); }
  .preview code { font-family: var(--mono); font-size: .88em; background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 4px; color: var(--cyan); }
  .preview pre { background: rgba(0,0,0,.35); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: .6em 0; }
  .preview pre code { background: none; padding: 0; color: var(--fg2); }
  .preview ul,.preview ol { margin: .5em 0 .5em 1.4em; color: var(--fg2); }
  .preview li { margin: .2em 0; }
  .preview a { color: var(--cyan); }
  .preview blockquote { border-left: 2px solid var(--violet); margin: .6em 0; padding: .2em 0 .2em 12px; color: var(--fg3); }
  .preview strong { color: var(--fg); } .preview hr { border: none; border-top: 1px solid var(--line); margin: 1em 0; }
  .split .panes { grid-template-columns: 1fr 1fr; }
  .split .preview { border-left: 1px solid var(--line); }
  .saved { font-family: var(--mono); font-size: 9.5px; color: var(--fg3); }
  ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
</style>
</head>
<body>
  <div class="side">
    <div class="side-h"><span class="t">NOTES</span><button id="new" title="New note">+</button></div>
    <div class="list" id="list"></div>
  </div>
  <div class="main" id="main">
    <div class="bar">
      <input id="title" placeholder="Untitled" />
      <span class="saved" id="saved"></span>
      <div class="seg" id="seg">
        <button data-v="edit">Edit</button>
        <button data-v="split" class="on">Split</button>
        <button data-v="read">Read</button>
      </div>
    </div>
    <div class="panes" id="panes">
      <textarea id="ed" placeholder="# Start typing…&#10;&#10;Markdown supported."></textarea>
      <div class="preview" id="pv"></div>
    </div>
  </div>

<script>
(function () {
  var KEY = "scry.notes.v1";
  var state = load();
  var saveTimer;

  function load() {
    try { var s = JSON.parse(localStorage.getItem(KEY)); if (s && s.notes) return s; } catch (e) {}
    var id = uid();
    return { notes: [{ id: id, title: "Welcome", body: "# Welcome to Notes\n\nA quick **markdown** scratchpad. It autosaves.\n\n- Click **+** for a new note\n- Toggle *Edit / Split / Read* up top\n\n```\nEverything stays on your machine.\n```", at: Date.now() }], cur: id, view: "split" };
  }
  function persist() { localStorage.setItem(KEY, JSON.stringify(state)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function cur() { return state.notes.find(function (n) { return n.id === state.cur; }) || state.notes[0]; }

  function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function inline(s) {
    return s
      .replace(/`([^`]+)`/g, function (_, c) { return "<code>" + esc(c) + "</code>"; })
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
  }
  function md(src) {
    var lines = src.split("\n"), out = [], i = 0;
    function flushList(tag, items) { if (items.length) out.push("<" + tag + ">" + items.map(function (x) { return "<li>" + inline(esc(x)) + "</li>"; }).join("") + "</" + tag + ">"); }
    while (i < lines.length) {
      var l = lines[i];
      if (/^```/.test(l)) { var buf = []; i++; while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i++; } i++; out.push("<pre><code>" + esc(buf.join("\n")) + "</code></pre>"); continue; }
      var h = l.match(/^(#{1,3})\s+(.*)$/); if (h) { out.push("<h" + h[1].length + ">" + inline(esc(h[2])) + "</h" + h[1].length + ">"); i++; continue; }
      if (/^>\s?/.test(l)) { out.push("<blockquote>" + inline(esc(l.replace(/^>\s?/, ""))) + "</blockquote>"); i++; continue; }
      if (/^(-{3,}|\*{3,})$/.test(l)) { out.push("<hr>"); i++; continue; }
      if (/^\s*[-*]\s+/.test(l)) { var items = []; while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) { items.push(lines[i].replace(/^\s*[-*]\s+/, "")); i++; } flushList("ul", items); continue; }
      if (/^\s*\d+\.\s+/.test(l)) { var its = []; while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { its.push(lines[i].replace(/^\s*\d+\.\s+/, "")); i++; } flushList("ol", its); continue; }
      if (l.trim() === "") { i++; continue; }
      out.push("<p>" + inline(esc(l)) + "</p>"); i++;
    }
    return out.join("\n");
  }

  var listEl = document.getElementById("list"), edEl = document.getElementById("ed"),
      pvEl = document.getElementById("pv"), titleEl = document.getElementById("title"),
      panes = document.getElementById("panes"), main = document.getElementById("main"),
      savedEl = document.getElementById("saved");

  function renderList() {
    listEl.innerHTML = "";
    state.notes.slice().sort(function (a, b) { return b.at - a.at; }).forEach(function (n) {
      var d = document.createElement("div");
      d.className = "note" + (n.id === state.cur ? " on" : "");
      d.innerHTML = '<span class="del" data-del="' + n.id + '">×</span><div class="nt">' + esc(n.title || "Untitled") + '</div><div class="nd">' + new Date(n.at).toLocaleDateString() + '</div>';
      d.addEventListener("click", function (e) {
        if (e.target.getAttribute("data-del")) { del(n.id); return; }
        state.cur = n.id; persist(); renderAll();
      });
      listEl.appendChild(d);
    });
  }
  function renderEditor() {
    var n = cur();
    titleEl.value = n.title; edEl.value = n.body; pvEl.innerHTML = md(n.body);
    main.className = "main" + (state.view === "split" ? " split" : "");
    edEl.style.display = state.view === "read" ? "none" : "";
    pvEl.style.display = state.view === "edit" ? "none" : "";
    panes.style.gridTemplateColumns = state.view === "split" ? "1fr 1fr" : "1fr";
    document.querySelectorAll("#seg button").forEach(function (b) { b.classList.toggle("on", b.dataset.v === state.view); });
  }
  function renderAll() { renderList(); renderEditor(); }

  function flashSaved() { savedEl.textContent = "saved"; clearTimeout(flashSaved._t); flashSaved._t = setTimeout(function () { savedEl.textContent = ""; }, 1200); }
  function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(function () { persist(); flashSaved(); }, 400); }

  edEl.addEventListener("input", function () { var n = cur(); n.body = edEl.value; n.at = Date.now(); pvEl.innerHTML = md(n.body); scheduleSave(); });
  titleEl.addEventListener("input", function () { var n = cur(); n.title = titleEl.value; n.at = Date.now(); renderList(); scheduleSave(); });
  document.getElementById("new").addEventListener("click", function () { var id = uid(); state.notes.push({ id: id, title: "", body: "", at: Date.now() }); state.cur = id; persist(); renderAll(); titleEl.focus(); });
  document.getElementById("seg").addEventListener("click", function (e) { var v = e.target.dataset.v; if (!v) return; state.view = v; persist(); renderEditor(); });
  function del(id) { state.notes = state.notes.filter(function (n) { return n.id !== id; }); if (!state.notes.length) state.notes.push({ id: uid(), title: "", body: "", at: Date.now() }); if (state.cur === id) state.cur = state.notes[0].id; persist(); renderAll(); }

  renderAll();
})();
</script>
</body>
</html>
